server:
  port: 8070
  error:
    whitelabel:
      enabled: false
spring:
  application:
    name: ops-log
  cloud:
    stream:
      binders:
        defaultRabbit:
          type: rabbit
          environment:
            spring:
              rabbitmq:
                host: 10.116.1.15
                port: 5672
                username: opsUser
                password: opsSales**
                virtual-host: /
      default-binder: defaultRabbit
      bindings:
        ops-common-log-sender:
          binder: defaultRabbit
          destination: ops-common-log-exchange
          content-type: application/json
        ops-common-log-receiver:
          binder: defaultRabbit
          destination: ops-common-log-exchange
          content-type: application/json
          group: ops-common-log-group
          consumer:
            maxAttempts: 1
            concurrency: 10
            durable-subscription: true
      rabbit:
        bindings:
          ops-common-log-receiver:
            consumer:
              acknowledge-mode: manual
              autoBindDlq: true

  servlet:
    multipart:
      enabled: true #是否启用http上传处理
      max-request-size: 100MB #设置总上传的数据大小，最大请求文件的大小
      max-file-size: 30MB #设置单个文件最大长度
      file-size-threshold: 20MB #当文件达到多少时进行磁盘写入
    # loadbalancer:
    #   ribbon:
    #     enabled: false
  autoconfigure:
    exclude: com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    dynamic:
      druid:
        initial-size: 1
        min-idle: 20
        max-active: 40
        max-wait: 90000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
      primary: opsdb
      datasource:
        opsdb:
          url: jdbc:sqlserver://10.116.32.9:1433;DatabaseName=ops_core
          username: opstest
          password: 123456
          driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
        opslog:
          url: jdbc:sqlserver://10.116.32.9:1433;DatabaseName=ops_log
          username: opstest
          password: 123456
          driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
        sharedb:
          url: jdbc:sqlserver://10.116.32.9:1433;DatabaseName=ops_sharedb
          username: opstest
          password: 123456
          driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  redis:
    lettuce:
      pool:
        min-idle: 10
        max-idle: 100
        max-active: 100
        maxWaitMillis: 60000
        testOnBorrow: true
        testOnReturn: true
        testWhileIdle: true
    ops-redis:
      cluster:
        nodes: 10.116.33.151:2003,10.116.33.151:2004,10.116.0.207:2001,10.116.0.207:2002,10.116.1.252:2005,10.116.1.252:2006
        max-redirects: 6
