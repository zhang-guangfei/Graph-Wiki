feign:
  hystrix:
    enabled: false
  okhttp:
    enabled: false
  httpclient:
    enabled: true
    maxConnections: 20000
    maxConnectionsPerRoute: 5000
    connectionTimeout: 12000
    time-to-live: 900

ribbon:
  eager-load:
    enabled: true
    clients: gps-job-service
  ReadTimeout: 500000
  ConnectTimeout: 500000
  MaxAutoRetries: 1
  MaxAutoRetriesNextServer: 1

hystrix:
  threadpool:
    default:
      coreSize: 2000       #并发执行的核心线程数，默认10。不能设置为0，初始化setter的时候会出现异常。设置服务端容器线程差不多，吞吐量较高
      maximumSize: 3000　　 #并发执行的最大线程数，默认10。
      maxQueueSize: 2000 　#BlockingQueue的最大队列数，当设为－1，会使用SynchronousQueue，值为正时使用LinkedBlcokingQueue。
      queueSizeRejectionThreshold: 500 #队列截断阈值，即使maxQueueSize没有达到，达到queueSizeRejectionThreshold后，请求也会被拒绝。若maxQueueSize=-1，该字段将不起作用。
  command:
    default:
      execution:
        timeout:
          enabled: true
        isolation:
          thread:
            timeoutInMilliseconds: 600001
      circuitBreaker:
        requestVolumeThreshold: 1000

logging:
  level:  # 日志级别
    #    org.springframework.boot: DEBUG
    #    feign.hystrix: DEBUG
    #    com.zaxxer.hikari: DEBUG
    org.activiti.engine.impl.persistence.entity: trace
    com.ops.delivery: DEBUG
    com.github.pagehelper: DEBUG
    java.sql.Statement: DEBUG
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
kettle:
  transPathPrefix: /ops/files/kettle


