name: Graph-Wiki CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev

permissions:
  contents: read

concurrency:
  group: graph-wiki-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workbench/package-lock.json

      - name: Install Python package
        run: python -m pip install -e '.[dev]'

      - name: Run release quality gate
        run: python scripts/release_quality_gate.py --output-dir output/release-quality-gate

      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-gate-report
          path: output/release-quality-gate/release-quality-gate-report.json
          if-no-files-found: ignore
          retention-days: 14
